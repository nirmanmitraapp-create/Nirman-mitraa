  <circle cx="32" cy="28" r="20" stroke="#f47920" stroke-width="4" fill="none"/>
  <!-- Hard hat -->
  <ellipse cx="32" cy="26" rx="13" ry="8" fill="#f47920"/>
  <rect x="21" y="30" width="22" height="4" rx="2" fill="#f47920"/>
  <!-- Building silhouettes -->
  <rect x="12" y="20" width="4" height="14" rx="1" fill="#ffffff" opacity="0.6"/>
  <rect x="48" y="16" width="4" height="18" rx="1" fill="#ffffff" opacity="0.6"/>
